<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citas - Happy Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>📅 Citas</h1>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="clientes.html">Clientes</a>
      <a href="mascotas.html">Mascotas</a>
      <a href="citas.html">Citas</a>
    </nav>
  </header>

  <main class="container">
    <div id="mensaje" class="alert"></div>

    <section class="card">
      <h2>Registrar / editar cita</h2>
      <form id="formCita">
        <div class="form-grid">
          <div class="form-group">
            <label for="id">ID</label>
            <input type="number" id="id" required />
          </div>
          <div class="form-group">
            <label for="fecha">Fecha y hora</label>
            <input type="datetime-local" id="fecha" required />
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label for="motivo">Motivo</label>
            <textarea id="motivo" required></textarea>
          </div>
          <div class="form-group">
            <label for="mascota_id">Mascota</label>
            <select id="mascota_id" required></select>
          </div>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">Guardar cita</button>
          <button class="btn-secondary" type="button" id="btnCancelar">Cancelar edición</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Listado de citas</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Fecha</th>
              <th>Mascota</th>
              <th>Dueño</th>
              <th>Motivo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCitas"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/citas.js"></script>
</body>
</html>
